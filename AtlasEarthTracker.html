<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Earth – Account Tracker (lokal)</title>
<style>
  :root{
    --bg:#0d1421; --panel:#15202f; --panel2:#1b2a3d; --border:#2b4057;
    --text:#e8eef5; --muted:#8fa3b8; --accent:#3ddc84; --accent2:#4db8ff;
    --gold:#ffd166; --red:#ff6b6b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px}
  h1{font-size:1.5rem;margin:0 0 4px}
  h2{font-size:1.05rem;margin:0 0 12px;color:var(--accent2);border-bottom:1px solid var(--border);padding-bottom:6px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .row label{font-size:.9rem;color:var(--muted);flex:1}
  input[type=number],input[type=date],input[type=text],select{
    background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:6px;padding:6px 8px;width:120px;text-align:right;font-size:.95rem}
  input[type=date]{width:150px;text-align:left}
  input[type=text]{text-align:left;width:160px}
  .pct{font-size:.8rem;color:var(--accent2)}
  select{width:auto;max-width:220px;text-align:left}
  input:focus,select:focus{outline:1px solid var(--accent2)}
  .chk{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--muted)}
  .rarity-c{color:#cfd8e3}.rarity-r{color:#4db8ff}.rarity-e{color:#c77dff}.rarity-l{color:var(--gold)}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--border)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted);font-weight:600}
  .big{font-size:1.4rem;font-weight:700;color:var(--accent)}
  .stat{display:flex;justify-content:space-between;padding:5px 0;font-size:.92rem;border-bottom:1px dashed var(--border)}
  .stat span:first-child{color:var(--muted)}
  .stat .val{font-weight:600}
  button{background:var(--accent);color:#08220f;border:none;border-radius:8px;
    padding:9px 16px;font-weight:700;cursor:pointer;font-size:.9rem}
  button.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  button.danger{background:none;color:var(--red);border:none;padding:2px 6px;font-size:1rem}
  button:hover{filter:brightness(1.15)}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .hint{font-size:.78rem;color:var(--muted);margin-top:8px;line-height:1.4}
  canvas{width:100%;height:200px;background:var(--panel2);border-radius:8px;margin-top:10px}
  .delta-up{color:var(--accent);font-size:.78rem}
  .help{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;
    background:var(--panel2);border:1px solid var(--border);color:var(--accent2);font-size:.75rem;
    font-weight:700;cursor:help;position:relative;margin-left:6px;vertical-align:2px}
  .help .tip{display:none;position:absolute;left:26px;top:-10px;z-index:10;width:min(360px,70vw);
    background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;
    font-size:.8rem;font-weight:400;color:var(--text);text-align:left;line-height:1.55;
    box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .help:hover .tip{display:block}
  .help .tip b{color:var(--accent2)}
  .fhelp{display:none}
  body.show-help .fhelp{display:inline-block}
  .row .help .tip,.stat .help .tip{top:22px;left:-100px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .topbtns{display:flex;gap:10px;flex-wrap:wrap}
  .wide{grid-column:1/-1}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;font-size:.85rem;color:var(--muted);align-items:center}
  .legend label{display:flex;gap:6px;align-items:center;cursor:pointer;color:var(--text)}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
  #chartTip{position:absolute;display:none;background:var(--panel2);border:1px solid var(--border);
    border-radius:8px;padding:8px 10px;font-size:.78rem;pointer-events:none;z-index:5;line-height:1.6;
    box-shadow:0 4px 12px rgba(0,0,0,.5);max-width:260px;white-space:nowrap}
  .be-line{font-size:.9rem;margin:7px 0;line-height:1.5}
  .be-line b{color:var(--accent2)}
  .be-warn b{color:var(--gold)}
  .be-bar{position:relative;height:22px;background:var(--panel2);border:1px solid var(--border);
    border-radius:11px;overflow:hidden;margin:8px 0;max-width:520px}
  .be-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .be-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:.75rem;font-weight:700;text-shadow:0 1px 2px #000}
  .setgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
  .subh{color:var(--accent2);font-size:.95rem;font-weight:600;margin-bottom:8px}
  .sec-row{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:4px 0;border-bottom:1px dashed var(--border);font-size:.9rem}
  .sec-row label{display:flex;gap:8px;align-items:center;cursor:pointer}
  .mini{background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:6px;padding:2px 8px;font-size:.8rem;cursor:pointer;font-weight:400}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);
    border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:.85rem;margin:0 6px 6px 0}
  .chip button{background:none;border:none;color:var(--red);cursor:pointer;padding:0;font-size:.9rem}
  input[type=color]{width:60px;height:30px;padding:2px;background:var(--panel2);
    border:1px solid var(--border);border-radius:6px;cursor:pointer}
  .ver-wrap{position:relative;display:inline-block}
  .ver{display:inline-block;background:var(--panel2);border:1px solid var(--accent2);color:var(--accent2);
    border-radius:12px;padding:2px 10px;font-size:.8rem;font-weight:600;cursor:pointer;
    vertical-align:4px;margin-left:6px;user-select:none}
  .ver:hover{filter:brightness(1.25)}
  #changelog{display:none;position:absolute;left:0;top:calc(100% + 6px);z-index:20;
    background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;
    width:min(440px,90vw);box-shadow:0 6px 20px rgba(0,0,0,.5);font-size:.85rem;font-weight:400}
  #changelog details{margin-bottom:6px}
  #changelog summary{cursor:pointer;color:var(--accent2);font-weight:600}
  #changelog ul{margin:6px 0 4px 18px;padding:0;color:var(--muted);line-height:1.55}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>🌍 Atlas Earth – Account Tracker <span id="playerName" class="pct" style="font-size:1.05rem"></span><span class="ver-wrap"><span class="ver" id="verBadge" onclick="toggleChangelog()"></span><span id="changelog"></span></span></h1>
    <div class="sub" data-i="topSub"></div>
  </div>
  <div class="topbtns">
    <button class="secondary" onclick="toggleSettings()" data-i="btnSettings"></button>
    <button class="secondary" id="langToggle" onclick="toggleLang()">🇬🇧 English</button>
    <button class="secondary" id="helpToggle" onclick="toggleHelp()"></button>
  </div>
</div>

<div class="grid">

  <!-- ============ EINSTELLUNGEN ============ -->
  <div class="card wide" id="settingsCard" style="display:none;order:-1">
    <h2><span data-i="h_settings"></span><span class="help fhelp">?<span class="tip" data-i="t_settings"></span></span></h2>
    <div class="setgrid">
      <div>
        <div class="row"><label data-i="set_name"></label><input type="text" id="setName" style="width:180px"></div>
        <div class="row"><label data-i="set_theme"></label>
          <select id="setTheme">
            <option value="ocean" data-i="theme_ocean"></option>
            <option value="forest" data-i="theme_forest"></option>
            <option value="violet" data-i="theme_violet"></option>
            <option value="amoled" data-i="theme_amoled"></option>
            <option value="light" data-i="theme_light"></option>
          </select>
        </div>
        <div class="row"><label data-i="set_accent"></label><input type="color" id="setAccent"></div>
        <div class="row"><label data-i="set_accent2"></label><input type="color" id="setAccent2"></div>
        <div class="row"><label data-i="set_font"></label>
          <select id="setFont">
            <option value="s" data-i="font_s"></option>
            <option value="m" data-i="font_m"></option>
            <option value="l" data-i="font_l"></option>
          </select>
        </div>
        <div class="btnrow">
          <button class="secondary" onclick="resetSettings()" data-i="set_reset"></button>
          <button class="secondary" style="color:var(--red);border-color:var(--red)" onclick="clearAllData()" data-i="set_clear"></button>
        </div>
      </div>
      <div>
        <div class="subh" data-i="set_sections"></div>
        <div id="secList"></div>
        <div class="hint" data-i="set_sectionsHint"></div>
      </div>
      <div>
        <div class="subh" data-i="set_games"></div>
        <div class="btnrow" style="margin-top:0">
          <input type="text" id="newGame" data-ph="set_gamesPh">
          <button class="secondary" onclick="addCustomGame()" data-i="set_gamesAdd"></button>
        </div>
        <div id="gameChips" style="margin-top:10px"></div>
        <div class="hint" data-i="set_gamesHint"></div>
      </div>
    </div>
  </div>

  <!-- ============ EINGABEN: PARCELS ============ -->
  <div class="card" data-sec="parcels">
    <h2>🏠 Parcels</h2>
    <div class="row"><label class="rarity-c">Common <span class="pct" id="pctC"></span><span class="help fhelp">?<span class="tip" data-i="t_common"></span></span></label><input type="number" id="common" min="0" value="0"></div>
    <div class="row"><label class="rarity-r">Rare <span class="pct" id="pctR"></span><span class="help fhelp">?<span class="tip" data-i="t_rare"></span></span></label><input type="number" id="rare" min="0" value="0"></div>
    <div class="row"><label class="rarity-e">Epic <span class="pct" id="pctE"></span><span class="help fhelp">?<span class="tip" data-i="t_epic"></span></span></label><input type="number" id="epic" min="0" value="0"></div>
    <div class="row"><label class="rarity-l">Legendary <span class="pct" id="pctL"></span><span class="help fhelp">?<span class="tip" data-i="t_legendary"></span></span></label><input type="number" id="legendary" min="0" value="0"></div>
    <div class="row"><label><span data-i="l_landmarks"></span><span class="help fhelp">?<span class="tip" data-i="t_landmarks"></span></span></label><input type="number" id="landmarks" min="0" value="0"></div>
    <div class="row"><label><span data-i="l_country"></span><span class="help fhelp">?<span class="tip" data-i="t_country"></span></span></label>
      <select id="country">
        <option value="FRA" selected data-i="o_fra"></option>
        <option value="USA">USA</option>
        <option value="CAN" data-i="o_can"></option>
        <option value="MEX" data-i="o_mex"></option>
        <option value="JAP" data-i="o_jap"></option>
        <option value="BRA" data-i="o_bra"></option>
        <option value="SWD" data-i="o_swd"></option>
        <option value="POL" data-i="o_pol"></option>
      </select>
    </div>
    <div class="stat"><span><span data-i="s_totalParcels"></span><span class="help fhelp">?<span class="tip" data-i="t_totalParcels"></span></span></span><span class="val" id="totalParcels">0</span></div>
    <div class="stat"><span><span data-i="s_rentShare"></span><span class="help fhelp">?<span class="tip" data-i="t_rentShare"></span></span></span><span class="val" id="rentShare">–</span></div>
  </div>

  <!-- ============ EINGABEN: ACCOUNT ============ -->
  <div class="card" data-sec="account">
    <h2>👤 Account</h2>
    <div class="row"><label><span data-i="l_badges"></span><span class="help fhelp">?<span class="tip" data-i="t_badges"></span></span></label><input type="number" id="badges" min="0" value="0"></div>
    <div class="row"><label><span data-i="l_freeBadges"></span><span class="help fhelp">?<span class="tip" data-i="t_freeBadges"></span></span></label><input type="number" id="freeBadges" min="0" value="0"></div>
    <div class="row"><label><span data-i="l_ab"></span><span class="help fhelp">?<span class="tip" data-i="t_ab"></span></span></label><input type="number" id="atlasBucks" min="0" value="0"></div>
    <div class="row"><label><span data-i="l_diamonds"></span><span class="help fhelp">?<span class="tip" data-i="t_diamonds"></span></span></label><input type="number" id="diamonds" min="0" value="0"></div>
    <div class="row"><label class="chk"><input type="checkbox" id="includeDiamonds"> <span data-i="l_inclDiamonds"></span><span class="help fhelp">?<span class="tip" data-i="t_inclDiamonds"></span></span></label></div>
    <div class="row"><label class="chk"><input type="checkbox" id="explorersClub"> <span data-i="l_explorers"></span><span class="help fhelp">?<span class="tip" data-i="t_explorers"></span></span></label></div>
    <div class="row"><label><span data-i="l_rentTotal"></span><span class="help fhelp">?<span class="tip" data-i="t_rentTotal"></span></span></label><input type="number" id="rentTotal" min="0" step="0.01" value="0"></div>
    <div class="row"><label><span data-i="l_startDate"></span><span class="help fhelp">?<span class="tip" data-i="t_startDate"></span></span></label><input type="date" id="startDate"></div>
    <div class="row"><label><span data-i="l_abPackage"></span><span class="help fhelp">?<span class="tip" data-i="t_abPackage"></span></span></label>
      <select id="abPackage">
        <option value="2400|99.99" data-i="o_pkg0"></option>
        <option value="2550|99.99" data-i="o_pkg1"></option>
        <option value="26000|999.99" data-i="o_pkg2"></option>
        <option value="54000|1999.00" data-i="o_pkg3"></option>
        <option value="140000|4999.99" data-i="o_pkg4"></option>
        <option value="290000|9999.99" data-i="o_pkg5"></option>
      </select>
    </div>
    <div class="row"><label><span data-i="l_goalAB"></span><span class="help fhelp">?<span class="tip" data-i="t_goalAB"></span></span></label><input type="number" id="goalAB" min="0" value="0"></div>
  </div>

  <!-- ============ EINGABEN: BOOST ============ -->
  <div class="card" data-sec="boost">
    <h2>🚀 Boost</h2>
    <div class="row"><label><span data-i="l_boostHours"></span><span class="help fhelp">?<span class="tip" data-i="t_boostHours"></span></span></label><input type="number" id="boostHours" min="0" max="24" step="0.5" value="24"></div>
    <div class="row"><label class="chk"><input type="checkbox" id="overrideBoost"> <span data-i="l_overrideBoost"></span><span class="help fhelp">?<span class="tip" data-i="t_overrideBoost"></span></span></label>
      <input type="number" id="overrideBoostValue" min="1" value="30" disabled></div>
    <div class="row"><label><span data-i="l_srbValue"></span><span class="help fhelp">?<span class="tip" data-i="t_srbValue"></span></span></label><input type="number" id="srbValue" min="0" value="50"></div>
    <div class="row"><label><span data-i="l_srbHours"></span><span class="help fhelp">?<span class="tip" data-i="t_srbHours"></span></span></label><input type="number" id="srbHours" min="0" value="64"></div>
    <div class="stat"><span><span data-i="s_autoBoost"></span><span class="help fhelp">?<span class="tip" data-i="t_autoBoost"></span></span></span><span class="val" id="autoBoost">30×</span></div>
    <div class="stat"><span><span data-i="s_badgeBoost"></span><span class="help fhelp">?<span class="tip" data-i="t_badgeBoost"></span></span></span><span class="val" id="badgeBoost">0 %</span></div>
    <div class="stat"><span><span data-i="s_nextBadgeInfo"></span><span class="help fhelp">?<span class="tip" data-i="t_nextBadgeInfo"></span></span></span><span class="val" id="nextBadgeInfo">–</span></div>
    <div class="stat"><span><span data-i="s_nextBadgeAB"></span><span class="help fhelp">?<span class="tip" data-i="t_nextBadgeAB"></span></span></span><span class="val" id="nextBadgeAB">–</span></div>
  </div>

  <!-- ============ ERGEBNISSE ============ -->
  <div class="card" data-sec="earnings">
    <h2><span data-i="h_earnings"></span><span class="help fhelp">?<span class="tip" data-i="t_earnings"></span></span></h2>
    <table>
      <thead><tr><th data-i="th_period"></th><th data-i="th_unboosted"></th><th data-i="th_boosted"></th></tr></thead>
      <tbody id="earningsBody"></tbody>
    </table>
    <div class="hint" data-i="hint_earnings"></div>
  </div>

  <!-- ============ PORTFOLIO ============ -->
  <div class="card" data-sec="portfolio">
    <h2 data-i="h_portfolio"></h2>
    <div class="stat"><span><span data-i="s_pv"></span><span class="help fhelp">?<span class="tip" data-i="t_pv"></span></span></span><span class="big" id="portfolioValue">$0.00</span></div>
    <div class="stat"><span><span data-i="s_invested"></span><span class="help fhelp">?<span class="tip" data-i="t_invested"></span></span></span><span class="val" id="investedAB">0 AB</span></div>
    <div class="stat"><span><span data-i="s_days"></span><span class="help fhelp">?<span class="tip" data-i="t_days"></span></span></span><span class="val" id="daysPlaying">–</span></div>
    <div class="stat"><span><span data-i="s_avgAB"></span><span class="help fhelp">?<span class="tip" data-i="t_avgAB"></span></span></span><span class="val" id="avgABPerDay">–</span></div>
    <div class="stat"><span><span data-i="s_goalDays"></span><span class="help fhelp">?<span class="tip" data-i="t_goalDays"></span></span></span><span class="val" id="daysToGoal">–</span></div>
    <div class="stat"><span><span data-i="s_diamondDays"></span><span class="help fhelp">?<span class="tip" data-i="t_diamondDays"></span></span></span><span class="val" id="diamondDays">–</span></div>
    <div class="stat"><span><span data-i="s_meanSec"></span><span class="help fhelp">?<span class="tip" data-i="t_meanSec"></span></span></span><span class="val" id="meanPerSec">–</span></div>
    <div class="stat"><span><span data-i="s_avgPower"></span><span class="help fhelp">?<span class="tip" data-i="t_avgPower"></span></span></span><span class="val" id="avgPower">–</span></div>
    <div class="stat"><span><span data-i="s_parcelValue"></span><span class="help fhelp">?<span class="tip" data-i="t_parcelValue"></span></span></span><span class="val" id="parcelValue">–</span></div>
  </div>

  <!-- ============ BREAKEVEN ============ -->
  <div class="card wide" data-sec="breakeven">
    <h2><span data-i="h_breakeven"></span><span class="help fhelp">?<span class="tip" data-i="t_breakeven"></span></span></h2>
    <div id="beSummary"></div>
    <table style="margin-top:10px">
      <thead><tr><th data-i="th_beRange"></th><th>Boost</th><th data-i="th_beBreakeven"></th><th data-i="th_beDayMin"></th><th data-i="th_beDayMax"></th></tr></thead>
      <tbody id="beBody"></tbody>
    </table>
    <div class="hint" data-i="hint_breakeven"></div>
  </div>

  <!-- ============ STÄDTE ============ -->
  <div class="card wide" data-sec="cities">
    <h2><span data-i="h_cities"></span><span class="help fhelp">?<span class="tip" data-i="t_cities"></span></span></h2>
    <table>
      <thead><tr><th data-i="th_city"></th><th>Parcels</th><th data-i="th_mayor"></th><th data-i="th_mayorAB"></th><th></th></tr></thead>
      <tbody id="cityBody"></tbody>
      <tfoot><tr style="font-weight:700">
        <td id="cityTotalCell"></td>
        <td id="cityParcels">0</td>
        <td id="cityMayors">0×</td>
        <td id="cityMayorAB">0 AB</td><td></td>
      </tr></tfoot>
    </table>
    <div class="btnrow"><button class="secondary" onclick="addCity()" data-i="btn_addCity"></button></div>
    <div class="hint" id="mayorStats"></div>
    <div class="hint" id="cityHint"></div>
  </div>

  <!-- ============ MINISPIELE ============ -->
  <div class="card wide" data-sec="minigames">
    <h2><span data-i="h_minigames"></span><span class="help fhelp">?<span class="tip" data-i="t_minigames"></span></span></h2>
    <div class="btnrow" style="margin-top:0;margin-bottom:10px;align-items:center">
      <select id="mgGame">
        <option>Warship</option><option>Bowling</option><option>Racer</option>
        <option>Fishing</option><option>Golf</option>
        <option>Vintage Fishing</option><option>Vintage Racer</option>
      </select>
      <input type="date" id="mgDate">
      <input type="number" id="mgPlace" min="1" style="width:90px" data-ph="ph_place">
      <input type="number" id="mgAB" min="0" placeholder="AB" style="width:90px">
      <button onclick="addMinigame()" data-i="btn_addEntry"></button>
    </div>
    <table>
      <thead><tr><th data-i="th_date"></th><th data-i="th_game"></th><th data-i="th_place"></th><th data-i="th_abGot"></th><th></th></tr></thead>
      <tbody id="mgBody"></tbody>
      <tfoot><tr style="font-weight:700">
        <td id="mgTotalCell"></td><td></td>
        <td id="mgAvgCell">–</td>
        <td id="mgTotalAB">0 AB</td><td></td>
      </tr></tfoot>
    </table>
    <div class="hint" id="mgStats"></div>
    <div class="hint" id="mgSummary"></div>
  </div>

  <!-- ============ VERLAUF ============ -->

const LS_PREFIX = "aet_";
let lang = localStorage.getItem(LS_PREFIX+"lang") || "de";
function LOC(){ return lang==="de" ? "de-DE" : "en-US"; }
function T(key, ...args){
  let s = (I18N[lang] && I18N[lang][key]) ?? I18N.de[key] ?? key;
  args.forEach((a,i)=>{ s = s.split("{"+i+"}").join(a); });
  return s;
}
function toggleLang(){
  lang = lang==="de" ? "en" : "de";
  localStorage.setItem(LS_PREFIX+"lang", lang);
  applyLang();
}
function applyLang(){
  document.documentElement.lang = lang;
  document.title = T("title_page");
  document.querySelectorAll("[data-i]").forEach(el=>{ el.innerHTML = T(el.dataset.i); });
  document.querySelectorAll("[data-ph]").forEach(el=>{ el.placeholder = T(el.dataset.ph); });
  document.getElementById("langToggle").textContent = T("btnLang");
  document.getElementById("helpToggle").textContent =
    document.body.classList.contains("show-help") ? T("btnHelpOff") : T("btnHelpOn");
  renderChartLegend();
  renderSettingsPanel();
  renderChangelog();
  calc(); renderSnapshots(); renderCities(); renderMinigames();
}

/* ====== Eingabe-Handling + localStorage ====== */
const FIELDS = ["common","rare","epic","legendary","landmarks","country","badges","freeBadges",
  "atlasBucks","diamonds","rentTotal","startDate","abPackage","goalAB",
  "boostHours","overrideBoostValue","srbValue","srbHours"];
const CHECKS = ["includeDiamonds","explorersClub","overrideBoost"];

function num(id){ const v = parseFloat(document.getElementById(id).value); return isNaN(v)||v<0?0:v; }
function fmt$(v, digits){
  if(digits===undefined) digits = Math.abs(v)>=0.01?2 : 10;
  return "$" + v.toLocaleString(LOC(),{minimumFractionDigits:digits,maximumFractionDigits:digits});
}
function fmtN(v){ return v.toLocaleString(LOC()); }

function loadAll(){
  for(const f of FIELDS){
    const v = localStorage.getItem(LS_PREFIX+f);
    if(v!==null) document.getElementById(f).value = v;
  }
  for(const c of CHECKS){
    const v = localStorage.getItem(LS_PREFIX+c);
    if(v!==null) document.getElementById(c).checked = (v==="true");
  }
}
function persistAll(){
  for(const f of FIELDS) localStorage.setItem(LS_PREFIX+f, document.getElementById(f).value);
  for(const c of CHECKS) localStorage.setItem(LS_PREFIX+c, document.getElementById(c).checked);
}

/* ====== Berechnung (Formeln des Original-Rechners) ====== */
function calc(){
  const c=num("common"), r=num("rare"), e=num("epic"), l=num("legendary");
  const total = c+r+e+l;
  const country = document.getElementById("country").value;
  const badges = num("badges");
  const bPct = badgePercent(badges);

  const basePerSec = c*RATES.common + r*RATES.rare + e*RATES.epic + l*RATES.legendary;
  const withBadge = basePerSec * (1 + bPct);

  let boost = adBoost(total, country);
  document.getElementById("autoBoost").textContent = boost + "×";
  document.getElementById("overrideBoostValue").disabled = !document.getElementById("overrideBoost").checked;
  if(document.getElementById("overrideBoost").checked) boost = Math.max(1, num("overrideBoostValue"));

  const bh = Math.min(24, num("boostHours"));
  const srbVal = num("srbValue"), srbHours = num("srbHours");

  // Pro Tag: bh Stunden geboostet, Rest unboosted (wie calcPerDay im Original)
  const perDayUnboosted = withBadge*86400;
  const perDayBoosted = withBadge*3600*(24-bh) + withBadge*boost*3600*bh;

  // Monat/Jahr inkl. Super-Rent-Boost (wie setEarnings im Original)
  const srbDaysPerMonth = srbHours/24;
  const srbPerDay = withBadge*3600*(24-bh) + withBadge*srbVal*3600*bh;
  let perMonthBoosted = perDayBoosted*DAYS_PER_MONTH;
  let perYearBoosted = perDayBoosted*DAYS_PER_YEAR;
  if(bh>0 && srbHours>0){
    perMonthBoosted = perDayBoosted*(DAYS_PER_MONTH-srbDaysPerMonth) + srbPerDay*srbDaysPerMonth;
    perYearBoosted  = perDayBoosted*(DAYS_PER_YEAR-srbDaysPerMonth*12) + srbPerDay*srbDaysPerMonth*12;
  }

  // Einnahmen-Tabelle
  const rows = [
    [T("r_sec"), withBadge, withBadge*boost, 10],
    [T("r_hour"), withBadge*3600, withBadge*boost*3600, 7],
    [T("r_day"), perDayUnboosted, perDayBoosted, 5],
    [T("r_week"), perDayUnboosted*7, perDayBoosted*7, 4],
    [T("r_month", DAYS_PER_MONTH.toFixed(1)), perDayUnboosted*DAYS_PER_MONTH, perMonthBoosted, 3],
    [T("r_year"), perDayUnboosted*DAYS_PER_YEAR, perYearBoosted, 2]
  ];
  document.getElementById("earningsBody").innerHTML = rows.map(([n,u,b,d]) =>
    `<tr><td>${n}</td><td>${fmt$(u,d)}</td><td style="color:var(--accent)">${fmt$(b,d)}</td></tr>`).join("");

  // Anzeige Parcels / Badges
  document.getElementById("totalParcels").textContent = fmtN(total);
  const pctIds = {pctC:c, pctR:r, pctE:e, pctL:l};
  for(const [id,count] of Object.entries(pctIds))
    document.getElementById(id).textContent = total>0 ? "("+(count/total*100).toFixed(2)+" %)" : "";
  document.getElementById("rentShare").textContent = basePerSec===0 ? "–" :
    [c*RATES.common, r*RATES.rare, e*RATES.epic, l*RATES.legendary]
      .map(x=>(x/basePerSec*100).toFixed(2)+"%").join(" / ");
  document.getElementById("badgeBoost").textContent = (bPct*100)+" %";
  const toNext = badgesToNextTier(badges);
  document.getElementById("nextBadgeInfo").textContent = bPct>=.25 ? T("badge_max") :
    T("badge_to", toNext, (badgePercent(badges+toNext))*100);
  document.getElementById("nextBadgeAB").textContent = bPct>=.25 ? "–" :
    fmtN(toNext*BADGE_COST_AB)+" AB";

  // Portfolio (wie Original: erste 200 AB gratis, AB-Paketkurs)
  const freeBadges = Math.min(num("freeBadges"), badges);
  const investedAB = total*PARCEL_COST_AB + (badges-freeBadges)*BADGE_COST_AB;
  let portfolioAB = investedAB>199 ? investedAB-200 : 0;
  portfolioAB += num("atlasBucks");
  const diamonds = num("diamonds");
  if(document.getElementById("includeDiamonds").checked) portfolioAB += diamonds*2;
  const [abAmt, abCost] = document.getElementById("abPackage").value.split("|").map(Number);
  const portfolioValue = portfolioAB/abAmt*abCost + num("rentTotal");
  document.getElementById("portfolioValue").textContent = fmt$(portfolioValue,2);
  document.getElementById("investedAB").textContent = fmtN(investedAB)+" AB";

  // Fortschritt
  const sd = document.getElementById("startDate").value;
  let avgAB = 0;
  if(sd){
    const days = Math.max(1, Math.round((Date.now()-new Date(sd).getTime())/86400000));
    avgAB = portfolioAB/days;
    document.getElementById("daysPlaying").textContent = fmtN(days);
    document.getElementById("avgABPerDay").textContent = avgAB.toFixed(2)+" AB";
  } else {
    document.getElementById("daysPlaying").textContent = "–";
    document.getElementById("avgABPerDay").textContent = "–";
  }
  const goal = num("goalAB");
  if(goal>0 && avgAB>0){
    const need = Math.max(0, goal-num("atlasBucks"));
    const d = Math.ceil(need/avgAB);
    const when = new Date(Date.now()+d*86400000).toLocaleDateString(LOC());
    document.getElementById("daysToGoal").textContent = need===0 ? T("goal_reached") : T("goal_days", d, when);
  } else document.getElementById("daysToGoal").textContent = "–";

  const spins = document.getElementById("explorersClub").checked ? 7 : 5;
  document.getElementById("diamondDays").textContent = diamonds>0 ? (diamonds/spins).toFixed(1)+T("unit_days") : "–";
  document.getElementById("avgPower").textContent = total>0 ? ((basePerSec/total)/RATES.common).toFixed(4)+"× Common" : "–";
  document.getElementById("meanPerSec").textContent = total>0 ? fmt$(withBadge/total, 11) : "–";
  document.getElementById("parcelValue").textContent = total>0 ? (withBadge/RATES.common).toFixed(2) : "–";

  renderBreakeven(total, country, bh, bPct,
    total>0 ? basePerSec/total : AVG_RATE,
    document.getElementById("overrideBoost").checked);

  persistAll();
  updateCityTotals();
  return { total, badges, ab: num("atlasBucks"), perDayBoosted, portfolioValue };
}

/* ----- Diagramm: mehrere wählbare Linien, Hover-Tooltip, Zusammenfassung ----- */
let chartSnaps = [];
const CHART_SERIES = [
  { key:"portfolio", color:"#3ddc84", get:s=>s.portfolio, fmt:v=>fmt$(v,2) },
  { key:"parcels",   color:"#4db8ff", get:s=>s.total,     fmt:v=>fmtN(v) },
  { key:"perDay",    color:"#ffd166", get:s=>s.perDay,    fmt:v=>fmt$(v,4) },
  { key:"badges",    color:"#c77dff", get:s=>s.badges,    fmt:v=>fmtN(v) },
  { key:"ab",        color:"#ff6b6b", get:s=>s.ab??0,     fmt:v=>fmtN(v) }
];
function getEnabledSeries(){
  const raw = localStorage.getItem(LS_PREFIX+"chartSeries");
  if(raw===null) return ["portfolio"];
  try{ const a = JSON.parse(raw); return Array.isArray(a) ? a : ["portfolio"]; }
  catch(e){ return ["portfolio"]; }
}
function renderChartLegend(){
  const enabled = getEnabledSeries();
  const el = document.getElementById("chartLegend");
  el.innerHTML = `<span>${T("chart_legendTitle")}</span>` + CHART_SERIES.map(s=>
    `<label><input type="checkbox" data-k="${s.key}" ${enabled.includes(s.key)?"checked":""}>
     <span class="dot" style="background:${s.color}"></span>${T("series_"+s.key)}</label>`).join("");
  el.querySelectorAll("input").forEach(cb => cb.addEventListener("change", ()=>{
    const sel = [...el.querySelectorAll("input:checked")].map(c=>c.dataset.k);
    localStorage.setItem(LS_PREFIX+"chartSeries", JSON.stringify(sel));
    drawChart(chartSnaps); renderChartSummary();
  }));
}
function chartGeom(cv, snaps){
  const pad=45, w=cv.width-pad*2, h=cv.height-30;
  const t0 = snaps[0].ts, t1 = snaps[snaps.length-1].ts;
  return { pad, w, h, t0, tspan:(t1-t0)||1 };
}
function seriesRange(serie, snaps){
  const vals = snaps.map(serie.get);
  const min = Math.min(...vals), max = Math.max(...vals);
  return { min, span:(max-min)||1 };
}
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#8fa3b8"; }
function drawChart(snaps, hoverIdx){
  const cv = document.getElementById("chart"), ctx = cv.getContext("2d");
  const cMuted = cssVar("--muted"), cBorder = cssVar("--border");
  ctx.clearRect(0,0,cv.width,cv.height);
  const msg = txt => { ctx.fillStyle=cMuted; ctx.font="14px Segoe UI"; ctx.textAlign="center";
                       ctx.fillText(txt, cv.width/2, cv.height/2); };
  if(snaps.length<2){ msg(T("chart_need2")); return; }
  const enabled = CHART_SERIES.filter(s=>getEnabledSeries().includes(s.key));
  if(enabled.length===0){ msg(T("chart_noSeries")); return; }
  const g = chartGeom(cv, snaps);

  // Gitter; Achsenwerte nur bei genau einer Linie (sonst eigene Skala je Linie)
  ctx.strokeStyle=cBorder; ctx.fillStyle=cMuted; ctx.font="11px Segoe UI"; ctx.textAlign="left";
  const single = enabled.length===1 ? seriesRange(enabled[0], snaps) : null;
  for(let i=0;i<=3;i++){
    const y = 10 + g.h - (g.h*i/3);
    ctx.beginPath(); ctx.moveTo(g.pad,y); ctx.lineTo(g.pad+g.w,y); ctx.stroke();
    const label = single ? enabled[0].fmt(single.min + single.span*i/3) : Math.round(100*i/3)+" %";
    ctx.fillText(label, 2, y+4);
  }

  // Hover-Führungslinie
  if(hoverIdx!=null && snaps[hoverIdx]){
    const hx = g.pad + (snaps[hoverIdx].ts-g.t0)/g.tspan*g.w;
    ctx.strokeStyle=cMuted; ctx.setLineDash([4,4]); ctx.beginPath();
    ctx.moveTo(hx,10); ctx.lineTo(hx,10+g.h); ctx.stroke(); ctx.setLineDash([]);
  }

  // Linien (jede auf ihren eigenen Bereich normiert)
  for(const serie of enabled){
    const r = seriesRange(serie, snaps);
    const pt = s => [ g.pad + (s.ts-g.t0)/g.tspan*g.w, 10 + g.h - (serie.get(s)-r.min)/r.span*g.h ];
    ctx.strokeStyle = serie.color; ctx.lineWidth=2; ctx.beginPath();
    snaps.forEach((s,i)=>{ const [x,y]=pt(s); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke();
    ctx.fillStyle = serie.color;
    snaps.forEach((s,i)=>{ const [x,y]=pt(s);
      ctx.beginPath(); ctx.arc(x,y, i===hoverIdx?5:3, 0, 7); ctx.fill(); });
  }

  ctx.fillStyle=cMuted; ctx.textAlign="center";
  ctx.fillText(new Date(g.t0).toLocaleDateString(LOC()), g.pad, cv.height-4);
  ctx.fillText(new Date(snaps[snaps.length-1].ts).toLocaleDateString(LOC()), g.pad+g.w, cv.height-4);
  ctx.fillText(T("chart_title"), cv.width/2, cv.height-4);
}
function renderChartSummary(){
  const el = document.getElementById("chartSummary");
  const snaps = chartSnaps;
  const enabled = CHART_SERIES.filter(s=>getEnabledSeries().includes(s.key));
  if(snaps.length<2 || enabled.length===0){ el.innerHTML=""; return; }
  const first = snaps[0], last = snaps[snaps.length-1];
  el.innerHTML = T("chart_devel") + enabled.map(serie=>{
    const a = serie.get(first), b = serie.get(last), d = b-a;
    const pct = a!==0 ? ((d/Math.abs(a))*100).toFixed(1)+" %" : "–";
    const sign = d>=0 ? "+" : "−";
    const dTxt = serie.key==="portfolio"||serie.key==="perDay" ? fmt$(Math.abs(d), serie.key==="perDay"?4:2) : fmtN(Math.abs(d));
    return `<span style="white-space:nowrap"><span class="dot" style="background:${serie.color};vertical-align:-1px"></span>
      ${T("series_"+serie.key)}: ${serie.fmt(a)} → ${serie.fmt(b)} (${sign}${dTxt} / ${sign}${pct})</span>`;
  }).join(" &nbsp;•&nbsp; ");
}
function chartHover(e){
  const cv = document.getElementById("chart"), tip = document.getElementById("chartTip");
  if(chartSnaps.length<2){ tip.style.display="none"; return; }
  const enabled = CHART_SERIES.filter(s=>getEnabledSeries().includes(s.key));
  if(enabled.length===0){ tip.style.display="none"; return; }
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX-rect.left) * (cv.width/rect.width);
  const g = chartGeom(cv, chartSnaps);
  let idx = 0, best = Infinity;
  chartSnaps.forEach((s,i)=>{
    const sx = g.pad + (s.ts-g.t0)/g.tspan*g.w;
    const dist = Math.abs(sx-x);
    if(dist<best){ best=dist; idx=i; }
  });
  drawChart(chartSnaps, idx);
  const s = chartSnaps[idx];
  tip.innerHTML = `<b>${new Date(s.ts).toLocaleDateString(LOC())}</b><br>` +
    enabled.map(serie=>`<span class="dot" style="background:${serie.color};vertical-align:-1px"></span> ${T("series_"+serie.key)}: <b>${serie.fmt(serie.get(s))}</b>`).join("<br>");
  tip.style.display = "block";
  const px = e.clientX-rect.left, py = e.clientY-rect.top;
  tip.style.left = Math.min(px+14, rect.width-tip.offsetWidth-4) + "px";
  tip.style.top = Math.max(0, Math.min(py+14, rect.height-tip.offsetHeight-4)) + "px";
}
function chartLeave(){
  document.getElementById("chartTip").style.display = "none";
  drawChart(chartSnaps);
}

/* ====== Städte & Bürgermeister ====== */
function getCities(){ try{ return JSON.parse(localStorage.getItem(LS_PREFIX+"cities"))||[]; }catch(e){ return []; } }
let cities = getCities();
function persistCities(){ localStorage.setItem(LS_PREFIX+"cities", JSON.stringify(cities)); }

function addCity(){
  cities.push({name:"", parcels:0, mayor:false, mayorAB:0});
  persistCities(); renderCities();
  const rows = document.querySelectorAll("#cityBody input[type=text]");
  if(rows.length) rows[rows.length-1].focus();
}
function deleteCity(i){
  if(cities[i].name && !confirm(T("confirm_delCity", cities[i].name))) return;
  cities.splice(i,1);
  if(openCityLog===i) openCityLog = null;
  else if(openCityLog!==null && openCityLog>i) openCityLog--;
  persistCities(); renderCities();
}
function updateCity(i, field, value){
  if(field==="name") cities[i].name = value;
  else if(field==="mayor"){ cities[i].mayor = value; persistCities(); renderCities(); return; }
  else cities[i][field] = Math.max(0, parseFloat(value)||0);
  persistCities(); updateCityTotals();
}
function updateCityTotals(){
  const parcels = cities.reduce((s,c)=>s+c.parcels,0);
  const mayors = cities.filter(c=>c.mayor).length;
  const mayorAB = cities.reduce((s,c)=>s+(c.mayor?c.mayorAB:0),0);
  document.getElementById("cityTotalCell").textContent = T("cityTotal", cities.length);
  document.getElementById("cityParcels").textContent = fmtN(parcels);
  document.getElementById("cityMayors").textContent = mayors+"×";
  document.getElementById("cityMayorAB").textContent = fmtN(mayorAB)+" AB";
  const total = num("common")+num("rare")+num("epic")+num("legendary");
  document.getElementById("cityHint").textContent = total>0 && parcels!==total
    ? T("city_hint", fmtN(parcels), fmtN(total))
    : "";
  // Bürgermeister-AB über alle datierten Verlaufs-Einträge: 30 T / 90 T / 1 Jahr / Gesamt
  const cut = days => new Date(Date.now() - days*86400000).toISOString().slice(0,10);
  const c30 = cut(30), c90 = cut(90), c365 = cut(365);
  let last30 = 0, last90 = 0, lastYear = 0, allTime = 0, hasLog = false;
  for(const c of cities){
    for(const e of (Array.isArray(c.mayorLog)?c.mayorLog:[])){
      hasLog = true;
      allTime += e.ab;
      if(e.date >= c365) lastYear += e.ab;
      if(e.date >= c90) last90 += e.ab;
      if(e.date >= c30) last30 += e.ab;
    }
  }
  document.getElementById("mayorStats").innerHTML = hasLog
    ? T("mayor_stats", fmtN(last30), fmtN(last90), fmtN(lastYear), fmtN(allTime))
    : "";
}
/* Datierter Verlauf der Bürgermeister-AB: "+1" verbucht 20 AB mit heutigem Datum,
   über 📅 lassen sich Einträge mit beliebigem Datum/Betrag nachtragen oder löschen.
   Das Summenfeld bleibt zusätzlich frei editierbar. */
const MAYOR_REWARD_AB = 20;
let openCityLog = null; // Index der Stadt mit aufgeklapptem Verlauf

function cityLog(c){ return Array.isArray(c.mayorLog) ? c.mayorLog : (c.mayorLog = []); }

function cityPlus(i){
  const c = cities[i];
  cityLog(c).push({ date: new Date().toISOString().slice(0,10), ab: MAYOR_REWARD_AB });
  c.mayorAB = (parseFloat(c.mayorAB)||0) + MAYOR_REWARD_AB;
  persistCities(); renderCities();
}
function toggleCityLog(i){
  openCityLog = openCityLog===i ? null : i;
  renderCities();
}
function addCityLogEntry(i){
  const date = document.getElementById("clDate").value;
  const ab = parseInt(document.getElementById("clAB").value,10);
  if(!date){ alert(T("alert_date")); return; }
  if(isNaN(ab) || ab<1) return;
  const c = cities[i];
  cityLog(c).push({ date, ab });
  c.mayorAB = (parseFloat(c.mayorAB)||0) + ab;
  persistCities(); renderCities();
}
function delCityLogEntry(i, j){
  const c = cities[i];
  const entry = cityLog(c)[j];
  if(!entry) return;
  c.mayorAB = Math.max(0, (parseFloat(c.mayorAB)||0) - entry.ab);
  c.mayorLog.splice(j,1);
  persistCities(); renderCities();
}
function cityLogDetailRow(c, i){
  const today = new Date().toISOString().slice(0,10);
  const entries = cityLog(c).map((e,j)=>({e,j}))
    .sort((a,b)=> b.e.date.localeCompare(a.e.date) || b.j-a.j);
  const list = entries.map(({e,j}) =>
    `<div class="sec-row"><span>${new Date(e.date+"T00:00").toLocaleDateString(LOC())} — +${fmtN(e.ab)} AB</span>
     <button class="danger" title="${T("del")}" onclick="delCityLogEntry(${i},${j})">✕</button></div>`).join("");

  return `<tr><td colspan="5" style="background:rgba(77,184,255,.05)">
    <div class="subh">📅 ${T("city_logTitle", c.name.replace(/</g,"&lt;") || "–")}</div>
    <div class="btnrow" style="margin-top:0">
      <input type="date" id="clDate" value="${today}">
      <input type="number" id="clAB" value="${MAYOR_REWARD_AB}" min="1" style="width:80px"> AB

    </div>
    <div style="margin-top:8px;max-width:520px">${list || `<span class="hint">${T("city_logEmpty")}</span>`}</div>
    ${entries.length ? `<div class="hint">${T("city_logSum", fmtN(sum), entries.length)}</div>` : ""}
  </td></tr>`;
}
function renderCities(){
  const tbody = document.getElementById("cityBody");
  tbody.innerHTML = cities.map((c,i)=>{
    const logCount = cityLog(c).length;
    return `<tr>
    <td><input type="text" value="${c.name.replace(/"/g,"&quot;")}" placeholder="${T("ph_cityName")}"
        oninput="updateCity(${i},'name',this.value)"></td>
    <td><input type="number" min="0" value="${c.parcels}" style="width:90px"
        oninput="updateCity(${i},'parcels',this.value)"></td>

        onchange="updateCity(${i},'mayor',this.checked)"></td>
    <td style="white-space:nowrap"><input type="number" min="0" value="${c.mayorAB}" style="width:90px" ${c.mayor?"":"disabled"}
        oninput="updateCity(${i},'mayorAB',this.value)"> AB
      <button class="mini" ${c.mayor?"":"disabled"} title="${T("city_plus1_title")}" onclick="cityPlus(${i})">+1</button>
      <button class="mini" title="${T("city_logBtn_title")}" onclick="toggleCityLog(${i})">📅${logCount?" "+logCount:""}</button></td>
    <td><button class="danger" title="${T("del")}" onclick="deleteCity(${i})">✕</button></td>
  </tr>` + (openCityLog===i ? cityLogDetailRow(c,i) : "");
  }).join("") || `<tr><td colspan="5" style="text-align:center;color:var(--muted)">${T("city_empty")}</td></tr>`;

  for(const m of minigames){

/* ====== Boost-Stufen & Breakeven ====== */
// Stundenfaktor eines Tages: (24-bh) unboosted + bh Stunden mit Multiplikator m.
// Tages-Einkommen = N * rate * (1+badge) * 3600 * hourFactor  →  linear in N.
function hourFactor(mult, bh){ return (24-bh) + mult*bh; }

function tierList(country){
  let prevMax = 0;
  return BOOST_TIERS[country].map(([max,mult])=>{
    const row = { min: prevMax+1, max, mult };
    prevMax = max;
    return row;
  });
}

function renderBreakeven(total, country, bh, bPct, meanRate, override){
  const sumEl = document.getElementById("beSummary");
  const body = document.getElementById("beBody");
  const tiers = tierList(country);
  const dayEarn = (N,mult) => N * meanRate * (1+bPct) * 3600 * hourFactor(mult,bh);
  const ci = tiers.findIndex(t => total <= t.max);

  // ---- Stufen-Tabelle ----
  body.innerHTML = tiers.map((t,i)=>{
    let be = "—";
    if(i>0){
      if(bh===0){
        be = fmtN(t.min); // ohne Boost-Stunden kein Einkommensknick
      } else {
        const prev = tiers[i-1];
        const beN = Math.ceil(prev.max * hourFactor(prev.mult,bh) / hourFactor(t.mult,bh));
        be = beN<=t.max ? fmtN(Math.max(beN, t.min)) : "—";
      }
    }
    const isCur = total>0 && i===ci;
    const range = t.max===Infinity ? fmtN(t.min)+"+" : fmtN(t.min)+"–"+fmtN(t.max);
    const here = isCur ? ` <span style="color:var(--accent2)">⬅ ${T("be_youAreHere", fmtN(total))}</span>` : "";
    const dMin = fmt$(dayEarn(t.min,t.mult),4);
    const dMax = t.max===Infinity ? "—" : fmt$(dayEarn(t.max,t.mult),4);
    return `<tr${isCur?' style="background:rgba(77,184,255,.08)"':''}>
      <td>${range}${here}</td><td>${t.mult}×</td>
      <td>${i>0 && be!=="—" ? "<b>"+be+"</b>" : be}</td>
      <td>${dMin}</td><td>${dMax}</td></tr>`;
  }).join("");

  // ---- Zusammenfassung ----
  const parts = [];
  if(total<=0){
    sumEl.innerHTML = `<div class="be-line">${T("be_noParcels")}</div>`;
    return;
  }
  const cur = tiers[ci];
  const dNow = dayEarn(total, cur.mult);

  parts.push(`<div class="be-line">${cur.max===Infinity
    ? T("be_currentLast", fmtN(cur.min), cur.mult)
    : T("be_current", fmtN(cur.min), fmtN(cur.max), cur.mult)}</div>`);
  parts.push(`<div class="be-line">${T("be_perDayNow", fmt$(dNow,4))}</div>`);

  if(bh===0){
    parts.push(`<div class="be-line">${T("be_noBoostHours")}</div>`);
  } else if(cur.max!==Infinity){
    // Fortschrittsbalken innerhalb der aktuellen Stufe
    const pct = Math.max(2, Math.min(100, ((total-cur.min+1)/(cur.max-cur.min+1))*100));
    parts.push(`<div class="be-bar"><div class="be-fill" style="width:${pct}%"></div>
      <div class="be-label">${fmtN(total)} / ${fmtN(cur.max)}</div></div>`);
    parts.push(`<div class="be-line">${T("be_toBoundary", fmtN(cur.max-total), fmtN(cur.max))}</div>`);

    const next = tiers[ci+1];
    parts.push(`<div class="be-line">${T("be_drop", cur.mult, next.mult)}</div>`);

    // Breakeven-Suche über alle folgenden Stufen (linear in N → Vergleich der Stundenfaktoren)
    let beN = null, beTier = null;
    for(let i=ci+1; i<tiers.length; i++){
      const t = tiers[i];
      let n = Math.ceil(total * hourFactor(cur.mult,bh) / hourFactor(t.mult,bh));
      if(n < t.min) n = t.min;
      if(n <= t.max){ beN = n; beTier = t; break; }
    }
    if(beN!==null){
      parts.push(`<div class="be-line">${T("be_breakevenAt", fmtN(beN), fmt$(dayEarn(beN,beTier.mult),4))}</div>`);
      if(beN > cur.max+1){
        parts.push(`<div class="be-line be-warn">${T("be_deadzone", fmtN(cur.max+1), fmtN(beN-1), fmt$(dNow,4))}</div>`);
      }
    }
  } else {
    parts.push(`<div class="be-line">${T("be_lastTier")}</div>`);
  }

  if(override) parts.push(`<div class="hint">${T("be_overrideNote")}</div>`);
  parts.push(`<div class="hint">${T("be_assume", (meanRate/RATES.common).toFixed(2))}</div>`);
  sumEl.innerHTML = parts.join("");
}

/* ====== Einstellungen (Themes, Layout, eigene Spiele) ====== */
const DEFAULT_GAMES = ["Warship","Bowling","Racer","Fishing","Golf","Vintage Fishing","Vintage Racer"];
const SECTION_KEYS = ["parcels","account","boost","earnings","portfolio","breakeven","cities","minigames","history"];
const SECTION_LABELS = { parcels:"sec_parcels", account:"sec_account", boost:"sec_boost",
  earnings:"h_earnings", portfolio:"h_portfolio", breakeven:"h_breakeven",
  cities:"h_cities", minigames:"h_minigames", history:"h_snapshots" };
const THEMES = {
  ocean:  { bg:"#0d1421", panel:"#15202f", panel2:"#1b2a3d", border:"#2b4057", text:"#e8eef5", muted:"#8fa3b8", accent:"#3ddc84", accent2:"#4db8ff" },
  forest: { bg:"#0c1510", panel:"#12201a", panel2:"#18302a", border:"#2b5747", text:"#e8f5ee", muted:"#8fb8a4", accent:"#4ade80", accent2:"#a3e635" },
  violet: { bg:"#140d21", panel:"#1d1530", panel2:"#271d40", border:"#453364", text:"#efe8f5", muted:"#a78fb8", accent:"#c77dff", accent2:"#ff7dcb" },
  amoled: { bg:"#000000", panel:"#0b0b0b", panel2:"#161616", border:"#2c2c2c", text:"#e8e8e8", muted:"#9a9a9a", accent:"#3ddc84", accent2:"#4db8ff" },
  light:  { bg:"#eef2f7", panel:"#ffffff", panel2:"#e3eaf2", border:"#bccadb", text:"#1b2733", muted:"#5d7186", accent:"#0e9f57", accent2:"#1769aa" }
};
const DEFAULT_SETTINGS = { name:"", theme:"ocean", accent:"", accent2:"", fontSize:"m",
  order:[...SECTION_KEYS], hidden:[], customGames:[] };

function normalizeSettings(s){
  const out = { ...DEFAULT_SETTINGS, ...(s||{}) };
  if(!THEMES[out.theme]) out.theme = "ocean";
  if(!Array.isArray(out.order)) out.order = [...SECTION_KEYS];
  out.order = out.order.filter(k=>SECTION_KEYS.includes(k));
  for(const k of SECTION_KEYS) if(!out.order.includes(k)) out.order.push(k);
  if(!Array.isArray(out.hidden)) out.hidden = [];
  out.hidden = out.hidden.filter(k=>SECTION_KEYS.includes(k));
  if(!Array.isArray(out.customGames)) out.customGames = [];
  out.customGames = out.customGames.map(g=>String(g)).filter(g=>g.trim()!=="");
  return out;
}
let SETTINGS;
try{ SETTINGS = normalizeSettings(JSON.parse(localStorage.getItem(LS_PREFIX+"settings"))); }
catch(e){ SETTINGS = normalizeSettings(null); }
function saveSettings(){ localStorage.setItem(LS_PREFIX+"settings", JSON.stringify(SETTINGS)); }

function applySettings(){
  const root = document.documentElement;
  const th = THEMES[SETTINGS.theme];
  for(const [k,v] of Object.entries(th)) root.style.setProperty("--"+k, v);
  if(SETTINGS.accent)  root.style.setProperty("--accent",  SETTINGS.accent);
  if(SETTINGS.accent2) root.style.setProperty("--accent2", SETTINGS.accent2);
  root.style.fontSize = { s:"87.5%", m:"100%", l:"115%" }[SETTINGS.fontSize] || "100%";
  document.getElementById("playerName").textContent = SETTINGS.name ? "– "+SETTINGS.name : "";
  document.querySelectorAll("[data-sec]").forEach(el=>{
    const k = el.dataset.sec;
    el.style.order = SETTINGS.order.indexOf(k);
    el.style.display = SETTINGS.hidden.includes(k) ? "none" : "";
  });
  rebuildGameSelect();
  if(chartSnaps.length) drawChart(chartSnaps); // Canvas-Farben ans Theme anpassen
}
function rebuildGameSelect(){
  const sel = document.getElementById("mgGame");
  const cur = sel.value;
  sel.innerHTML = [...DEFAULT_GAMES, ...SETTINGS.customGames]
    .map(g=>`<option>${g.replace(/</g,"&lt;")}</option>`).join("");
  if([...sel.options].some(o=>o.value===cur)) sel.value = cur;
}
function toggleSettings(){
  const c = document.getElementById("settingsCard");
  c.style.display = c.style.display==="none" ? "" : "none";
}
function renderSettingsPanel(){
  document.getElementById("setName").value = SETTINGS.name;
  document.getElementById("setTheme").value = SETTINGS.theme;
  document.getElementById("setAccent").value  = SETTINGS.accent  || THEMES[SETTINGS.theme].accent;
  document.getElementById("setAccent2").value = SETTINGS.accent2 || THEMES[SETTINGS.theme].accent2;
  document.getElementById("setFont").value = SETTINGS.fontSize;
  renderSecList();
  renderGameChips();
}
function renderSecList(){
  document.getElementById("secList").innerHTML = SETTINGS.order.map((k,i)=>`<div class="sec-row">
    <label><input type="checkbox" ${SETTINGS.hidden.includes(k)?"":"checked"}
      onchange="toggleSection('${k}',this.checked)"><span>${T(SECTION_LABELS[k])}</span></label>
    <span><button class="mini" onclick="moveSection(${i},-1)" ${i===0?"disabled":""}>▲</button>
    <button class="mini" onclick="moveSection(${i},1)" ${i===SETTINGS.order.length-1?"disabled":""}>▼</button></span>
  </div>`).join("");
}
function toggleSection(key, visible){
  SETTINGS.hidden = visible ? SETTINGS.hidden.filter(k=>k!==key) : [...SETTINGS.hidden, key];
  saveSettings(); applySettings();
}
function moveSection(i, dir){
  const j = i+dir;
  if(j<0 || j>=SETTINGS.order.length) return;
  [SETTINGS.order[i], SETTINGS.order[j]] = [SETTINGS.order[j], SETTINGS.order[i]];
  saveSettings(); applySettings(); renderSecList();
}
function addCustomGame(){
  const inp = document.getElementById("newGame");
  const v = inp.value.trim();
  if(!v) return;
  if(![...DEFAULT_GAMES, ...SETTINGS.customGames].includes(v)){
    SETTINGS.customGames.push(v);
    saveSettings(); applySettings(); renderGameChips();
  }
  inp.value = "";
}
function removeCustomGame(i){
  SETTINGS.customGames.splice(i,1);
  saveSettings(); applySettings(); renderGameChips();
}
function renderGameChips(){
  document.getElementById("gameChips").innerHTML = SETTINGS.customGames.map((g,i)=>
    `<span class="chip">${g.replace(/</g,"&lt;")}<button onclick="removeCustomGame(${i})" title="${T("del")}">✕</button></span>`
  ).join("") || `<span class="hint">${T("set_noGames")}</span>`;
}
function resetSettings(){
  if(!confirm(T("confirm_reset"))) return;
  SETTINGS = normalizeSettings(null);
  saveSettings(); applySettings(); renderSettingsPanel();
}
function clearAllData(){
  if(!confirm(T("confirm_clear1"))) return;
  if(!confirm(T("confirm_clear2"))) return;
  // Nur die Tracker-Schlüssel (aet_*) entfernen – nicht den gesamten Browser-Speicher,
  // den sich lokale Dateien je nach Browser teilen können.
  const keys = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith(LS_PREFIX)) keys.push(k);
  }
  keys.forEach(k=>localStorage.removeItem(k));
  location.reload();
}

/* ====== Versions-Badge & Changelog ====== */
function renderChangelog(){
  document.getElementById("verBadge").textContent = "v"+VERSION;
  document.getElementById("changelog").innerHTML =
    `<div class="subh">${T("changelog_title")}</div>` +
    CHANGELOG.map((e,idx)=>`<details ${idx===0?"open":""}>
      <summary>Version ${e.v}</summary>
      <ul>${(lang==="en"?e.en:e.de).map(li=>`<li>${li}</li>`).join("")}</ul>
    </details>`).join("");
}
function toggleChangelog(){
  const c = document.getElementById("changelog");
  c.style.display = c.style.display==="block" ? "none" : "block";
}
// Klick außerhalb schließt das Changelog
document.addEventListener("click", e=>{
  if(!e.target.closest(".ver-wrap")){
    const c = document.getElementById("changelog");
    if(c) c.style.display = "none";
  }
});

/* ====== Hilfe ein-/ausblenden ====== */
function toggleHelp(){
  const on = !document.body.classList.contains("show-help");
  document.body.classList.toggle("show-help", on);
  localStorage.setItem(LS_PREFIX+"showHelp", on);
  document.getElementById("helpToggle").textContent = on ? T("btnHelpOff") : T("btnHelpOn");
}

/* ====== Export / Import ====== */
function exportData(){
  const data = { exported: new Date().toISOString(), inputs:{}, checks:{}, snapshots: getSnapshots(), cities, minigames, settings: SETTINGS };
  for(const f of FIELDS) data.inputs[f] = document.getElementById(f).value;
  for(const c of CHECKS) data.checks[c] = document.getElementById(c).checked;
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "atlas-earth-stats-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(a.href);
}
function importData(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(data.inputs) for(const f of FIELDS) if(data.inputs[f]!==undefined) document.getElementById(f).value = data.inputs[f];
      if(data.checks) for(const c of CHECKS) if(data.checks[c]!==undefined) document.getElementById(c).checked = data.checks[c];
      if(Array.isArray(data.snapshots)) setSnapshots(data.snapshots);
      if(Array.isArray(data.cities)){ cities = data.cities; persistCities(); renderCities(); }
      if(Array.isArray(data.minigames)){ minigames = data.minigames; persistMinigames(); renderMinigames(); }
      if(data.settings){ SETTINGS = normalizeSettings(data.settings); saveSettings(); applySettings(); renderSettingsPanel(); }
      calc();
      alert(T("import_ok", data.snapshots?.length||0, data.cities?.length||0, data.minigames?.length||0));
    }catch(e){ alert(T("import_fail")+e.message); }
  };
  reader.readAsText(file);
  input.value = "";
}

// Einmalige Korrektur: früherer Standard war USA – neuer Standard ist Deutschland/Frankreich.
// Wer danach bewusst USA wählt, behält es (Flag verhindert erneutes Umstellen).
if(localStorage.getItem(LS_PREFIX+"country")==="USA" && !localStorage.getItem(LS_PREFIX+"countryFix")){
  localStorage.setItem(LS_PREFIX+"country","FRA");
}
localStorage.setItem(LS_PREFIX+"countryFix","1");
loadAll();
for(const id of [...FIELDS, ...CHECKS]){
  document.getElementById(id).addEventListener("input", calc);
  document.getElementById(id).addEventListener("change", calc);
}
// Heutiges Datum als Vorgabe für neue Minispiel-Einträge
document.getElementById("mgDate").value = new Date().toISOString().slice(0,10);
// Hover-Tooltip im Diagramm
document.getElementById("chart").addEventListener("mousemove", chartHover);
document.getElementById("chart").addEventListener("mouseleave", chartLeave);
// Einstellungen: Eingaben verdrahten
document.getElementById("setName").addEventListener("input", e=>{
  SETTINGS.name = e.target.value.trim(); saveSettings();
  document.getElementById("playerName").textContent = SETTINGS.name ? "– "+SETTINGS.name : "";
});
document.getElementById("setTheme").addEventListener("change", e=>{
  SETTINGS.theme = e.target.value;
  SETTINGS.accent = ""; SETTINGS.accent2 = ""; // Theme-Wechsel setzt eigene Akzentfarben zurück
  saveSettings(); applySettings(); renderSettingsPanel();
});
document.getElementById("setAccent").addEventListener("input", e=>{
  SETTINGS.accent = e.target.value; saveSettings(); applySettings();
});
document.getElementById("setAccent2").addEventListener("input", e=>{
  SETTINGS.accent2 = e.target.value; saveSettings(); applySettings();
});
document.getElementById("setFont").addEventListener("change", e=>{
  SETTINGS.fontSize = e.target.value; saveSettings(); applySettings();
});
document.getElementById("newGame").addEventListener("keydown", e=>{
  if(e.key==="Enter") addCustomGame();
});
// Hilfe-Modus wiederherstellen (vor applyLang, damit der Button-Text stimmt)
if(localStorage.getItem(LS_PREFIX+"showHelp")==="true") document.body.classList.add("show-help");
// Einstellungen anwenden (Theme, Layout, Spiele), dann Sprache – ruft calc() + alle Renderer auf
applySettings();
applyLang();
</script>
